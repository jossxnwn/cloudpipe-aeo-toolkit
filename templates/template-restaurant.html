  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    :root {
      --ink: #0f0e0c;
      --cream: #f5f0e8;
      --gold: #b8973a;
      --gold-light: #d4ad4f;
      --stone: #8c8478;
      --white: #fefefe;
      --gap: 1px solid rgba(139,132,120,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 4vw;
      background: rgba(245,240,232,0.92);
      backdrop-filter: blur(12px);
      border-bottom: var(--gap);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.82rem; font-weight: 400; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--stone);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta {
      padding: 0.55rem 1.4rem;
      background: var(--ink); color: var(--cream);
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      border: 1px solid var(--ink); transition: all 0.25s;
    }
    .nav-cta:hover { background: transparent; color: var(--ink); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-top: 5rem;
    }
    .hero-left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 5vw 4vw 5vw 6vw;
      border-right: var(--gap);
    }
    .hero-tag {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-tag::before {
      content: ''; display: block; width: 32px; height: 1px; background: var(--gold);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 5.5vw, 5rem);
      font-weight: 600; line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }
    h1 em { font-style: italic; color: var(--gold); }
    .hero-desc {
      font-size: 1rem; color: var(--stone); max-width: 420px;
      line-height: 1.8; margin-bottom: 3rem;
    }
    .hero-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-primary {
      padding: 0.9rem 2rem;
      background: var(--ink); color: var(--cream);
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; text-decoration: none;
      transition: all 0.25s; border: 1px solid var(--ink);
      display: inline-block;
    }
    .btn-primary:hover { background: var(--gold); border-color: var(--gold); }
    .btn-ghost {
      font-size: 0.82rem; color: var(--stone); letter-spacing: 0.06em;
      text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--ink); }
    .hero-right {
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 5vw 4vw;
    }
    .hero-stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: rgba(139,132,120,0.2);
      margin-top: auto;
    }
    .hero-stat {
      background: var(--cream);
      padding: 2rem;
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 600; color: var(--ink);
      line-height: 1;
    }
    .stat-label { font-size: 0.75rem; color: var(--stone); margin-top: 0.4rem; letter-spacing: 0.08em; }

    /* ── USP STRIP ── */
    .usp-strip {
      border-top: var(--gap); border-bottom: var(--gap);
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: rgba(139,132,120,0.06);
    }
    .usp-item {
      padding: 3rem 2.5rem;
      border-right: var(--gap);
    }
    .usp-item:last-child { border-right: none; }
    .usp-icon {
      font-size: 1.5rem; margin-bottom: 1rem;
    }
    .usp-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 600; margin-bottom: 0.6rem;
    }
    .usp-desc { font-size: 0.88rem; color: var(--stone); line-height: 1.7; }

    /* ── SECTION BASE ── */
    section { padding: 6rem 6vw; }
    .section-label {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::before {
      content: ''; display: block; width: 24px; height: 1px; background: var(--gold);
    }
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 600; line-height: 1.1; letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }
    h2 em { font-style: italic; color: var(--gold); }

    /* ── PORTFOLIO ── */
    .portfolio { background: var(--white); }
    .portfolio-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 3rem; border-bottom: var(--gap); padding-bottom: 2rem;
    }
    .portfolio-header p { max-width: 360px; font-size: 0.9rem; color: var(--stone); }
    .portfolio-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    }
    .portfolio-card {
      position: relative; overflow: hidden;
      background: var(--cream);
      cursor: pointer;
    }
    .portfolio-card-img {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(135deg, #e8e0d4 0%, #d4c9b8 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .portfolio-card:hover .portfolio-card-img { transform: scale(1.04); }
    .portfolio-card-info { padding: 1.25rem; border-top: var(--gap); }
    .portfolio-card-tag {
      font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.4rem;
    }
    .portfolio-card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; }

    /* ── SERVICES ── */
    .services-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 1px; background: rgba(139,132,120,0.2); margin-top: 3rem;
    }
    .service-item {
      background: var(--cream); padding: 2.5rem;
      transition: background 0.2s;
    }
    .service-item:hover { background: var(--white); }
    .service-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; color: rgba(139,132,120,0.2); font-weight: 600;
      line-height: 1; margin-bottom: 0.5rem;
    }
    .service-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; }
    .service-desc { font-size: 0.88rem; color: var(--stone); line-height: 1.7; }

    /* ── PROCESS ── */
    .process { background: var(--ink); color: var(--cream); }
    .process .section-label { color: var(--gold-light); }
    .process .section-label::before { background: var(--gold-light); }
    .process h2 { color: var(--cream); }
    .process-steps {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: rgba(255,255,255,0.08); margin-top: 3rem;
    }
    .process-step {
      padding: 2.5rem 2rem;
      background: var(--ink);
    }
    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.5rem;
    }
    .step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--cream); margin-bottom: 0.75rem; }
    .step-desc { font-size: 0.82rem; color: rgba(245,240,232,0.55); line-height: 1.7; }

    /* ── TESTIMONIALS ── */
    .testimonials { background: var(--white); }
    .testimonial-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem; margin-top: 3rem;
    }
    .testimonial-card {
      padding: 2rem; border: var(--gap); position: relative;
    }
    .testimonial-card::before {
      content: '"';
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; color: rgba(184,151,58,0.15);
      position: absolute; top: 0.5rem; left: 1.5rem;
      line-height: 1;
    }
    .testimonial-text { font-size: 0.9rem; color: var(--stone); line-height: 1.8; margin-bottom: 1.5rem; padding-top: 1.5rem; }
    .testimonial-author { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; }
    .testimonial-role { font-size: 0.75rem; color: var(--gold); margin-top: 0.25rem; }

    /* ── FAQ ── */
    .faq { border-top: var(--gap); }
    .faq-list { margin-top: 3rem; }
    .faq-item { border-bottom: var(--gap); }
    .faq-q {
      width: 100%; text-align: left; background: none; border: none; cursor: pointer;
      padding: 1.5rem 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--ink);
      display: flex; justify-content: space-between; align-items: center;
    }
    .faq-q span { font-size: 1.2rem; color: var(--gold); transition: transform 0.3s; }
    .faq-q.open span { transform: rotate(45deg); }
    .faq-a { font-size: 0.88rem; color: var(--stone); line-height: 1.8; padding: 0 0 1.5rem; display: none; max-width: 680px; }
    .faq-a.open { display: block; }

    /* ── CTA BANNER ── */
    .cta-banner {
      padding: 6rem 6vw;
      background: linear-gradient(135deg, #0f0e0c 60%, #1a1712);
      color: var(--cream);
      display: grid; grid-template-columns: 1fr auto;
      gap: 4rem; align-items: center;
    }
    .cta-banner h2 { color: var(--cream); max-width: 600px; }
    .cta-banner p { color: rgba(245,240,232,0.6); margin-top: 0.75rem; font-size: 0.9rem; }
    .cta-actions { display: flex; flex-direction: column; gap: 1rem; white-space: nowrap; }
    .btn-gold {
      padding: 0.9rem 2rem; background: var(--gold); color: var(--ink);
      font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; text-decoration: none;
      border: 1px solid var(--gold); transition: all 0.25s;
      display: inline-block; text-align: center;
    }
    .btn-gold:hover { background: transparent; color: var(--gold); }
    .btn-outline-cream {
      padding: 0.9rem 2rem;
      border: 1px solid rgba(245,240,232,0.25); color: rgba(245,240,232,0.7);
      font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none; transition: all 0.25s; display: block; text-align: center;
    }
    .btn-outline-cream:hover { border-color: var(--cream); color: var(--cream); }

    /* ── FOOTER ── */
    footer {
      padding: 3rem 6vw;
      border-top: var(--gap);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--cream);
    }
    .footer-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
    .footer-copy { font-size: 0.75rem; color: var(--stone); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-left > * {
      animation: fadeUp 0.7s ease both;
    }
    .hero-left > *:nth-child(1) { animation-delay: 0.1s; }
    .hero-left > *:nth-child(2) { animation-delay: 0.25s; }
    .hero-left > *:nth-child(3) { animation-delay: 0.4s; }
    .hero-left > *:nth-child(4) { animation-delay: 0.55s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .hero-right { display: none; }
      .hero-left { padding: 3rem 5vw; }
      .nav-links { display: none; }
      .usp-strip, .services-grid, .process-steps, .testimonial-grid, .portfolio-grid { grid-template-columns: 1fr; }
      .cta-banner { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
function toggleFaq(btn) {
  const answer = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.faq-q').forEach(b => {
    b.classList.remove('open');
    b.nextElementSibling.classList.remove('open');
  });
  if (!isOpen) {
    btn.classList.add('open');
    answer.classList.add('open');
  }
}

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.opacity = '1';
      e.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.usp-item, .portfolio-card, .service-item, .process-step, .testimonial-card').forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(20px)';
  el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  observer.observe(el);
});
</script>
